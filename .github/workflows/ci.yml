name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  syntax:
    name: Syntax & encoding check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Compile all Python files
        run: |
          find . -name '*.py' -not -path './.git/*' -print0 \
            | xargs -0 -r python -m py_compile
          echo "All Python files compile."

      - name: Check shell scripts
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 -r -n1 bash -n
          echo "All shell scripts parse."

      - name: Verify every file is valid UTF-8
        run: |
          python - <<'PY'
          import pathlib, sys
          bad = []
          for p in pathlib.Path('.').rglob('*'):
              if p.is_file() and '.git/' not in str(p) and p.suffix in {'.py', '.sh', '.md', '.js', '.json', '.yml'}:
                  try:
                      p.read_bytes().decode('utf-8')
                  except UnicodeDecodeError:
                      bad.append(str(p))
          if bad:
              print("Not valid UTF-8:", *bad, sep="\n  "); sys.exit(1)
          print("All text files are valid UTF-8.")
          PY

  licence:
    name: Licence file present
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # 这个项目是 GPL-3。传染性全靠 LICENSE 这个文件撑着——被谁误删、或者
      # 哪次复制模版时又换回 MIT，开源约定就悄悄失效了，而这种事不会有任何
      # 东西提醒你。所以让 CI 盯着。
      - name: LICENSE must exist and be GPL-3
        run: |
          test -s LICENSE
          grep -q "GNU GENERAL PUBLIC LICENSE" LICENSE
          grep -q "Version 3" LICENSE
          echo "licence OK"
